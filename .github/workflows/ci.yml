name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: proteus-next/package-lock.json

      - name: Install dependencies
        working-directory: proteus-next
        run: npm ci

      - name: Type check
        working-directory: proteus-next
        run: npx tsc --noEmit

      - name: Build
        working-directory: proteus-next
        run: npm run build
