name: Model Health Check

on:
  schedule:
    - cron: "0 */3 * * *"  # Every 3 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  check-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run model health check
        id: health
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: node proteus-next/scripts/model-health.mjs

      - name: Commit model changes
        if: steps.health.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES="${{ steps.health.outputs.changes_json }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-replace unhealthy models

          Model health check detected and replaced unhealthy models.
          Changes: ${CHANGES}"
          git push
