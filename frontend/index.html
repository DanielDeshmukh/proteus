    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PROTEUS",
      "alternateName": "PROTEUS Application Intelligence",
      "url": "https://proteus-app.dev",
      "description": "AI-powered job application toolkit that analyzes your resume against job descriptions using a 5-agent pipeline. Produces semantic match scores, gap analysis, bullet-level rewrite suggestions, and tailored cover letters.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Daniel Deshmukh",
        "url": "https://github.com/DanielDeshmukh"
      },
      "featureList": [
        "Semantic resume-job match scoring",
        "AI-powered gap analysis",
        "Bullet-level rewrite suggestions",
        "Tailored cover letter generation",
        "Application history tracking",
        "PDF and DOCX file upload",
        "Job description URL ingestion"
      ],
      "softwareHelp": {
        "@type": "HelpOnlineSystem",
        "url": "https://github.com/DanielDeshmukh/proteus#readme"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PROTEUS",
      "url": "https://proteus-app.dev",
      "description": "AI-powered job application intelligence — semantic match scores, gap analysis, rewrite suggestions, and cover letters from a single JD.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://proteus-app.dev/history?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is PROTEUS?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PROTEUS is an AI-powered job application toolkit that takes a job description and your resume, runs them through a 5-agent pipeline using NVIDIA NIM, and returns a semantic match score, gap analysis, bullet-level rewrite suggestions, and a tailored cover letter."
          }
        },
        {
          "@type": "Question",
          "name": "How does PROTEUS score my resume against a job description?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PROTEUS uses embedding-based semantic similarity (nvidia/nv-embedqa-e5-v5) to compare your resume against JD requirements. Unlike keyword matching, it understands that 'implemented Qdrant-based retrieval' matches 'experience with vector databases' even without literal keyword overlap."
          }
        },
        {
          "@type": "Question",
          "name": "What file formats does PROTEUS support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PROTEUS supports PDF, DOCX, and plain text files for both job descriptions and resumes. You can also paste text directly or provide a job posting URL."
          }
        },
        {
          "@type": "Question",
          "name": "Is PROTEUS free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, PROTEUS is an open-source project available under the MIT license. You can run it locally with your own NVIDIA NIM API key."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
